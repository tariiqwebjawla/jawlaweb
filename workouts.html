<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>تمارين جولة</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <header class="top">
    <a href="home.html">الرئيسية</a>
    <h1>التمارين</h1>
    <a href="calculator.html">الحاسبة</a>
    <button type="button" onclick="logoutJawla()">خروج</button>
  </header>

  <main class="container">
    <section class="hero-mini">
      <h2>برامج التمارين</h2>
      <p>اختر القسم المناسب لك، ثم افتح الجدول واعرض التمارين وروابط الفيديو.</p>

      <div class="mode-tabs">
        <button class="tab active" data-mode="">الكل</button>
        <button class="tab" data-mode="نادي">نادي</button>
        <button class="tab" data-mode="منزل">منزل</button>
      </div>
    </section>

    <div class="filters">
      <input id="wq" placeholder="ابحث عن تمرين أو عضلة">

      <select id="program">
        <option value="">كل البرامج</option>
      </select>

      <select id="wtype">
        <option value="">كل الأقسام</option>
      </select>

      <select id="wlevel">
        <option value="">كل المستويات</option>
        <option>مبتدئ</option>
        <option>متوسط</option>
        <option>متقدم</option>
      </select>
    </div>

    <div id="wstats" class="stats"></div>
    <div id="workouts" class="workouts-list"></div>
  </main>

  <script src="js/workouts-data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>

  <script>
    requireJawlaPlan(["training"]);
  </script>
</body>
</html>
